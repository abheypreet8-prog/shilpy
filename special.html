<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM OVERRIDE</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41; /* Matrix Green */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .box {
            text-align: center;
            padding: 40px;
            border: 2px solid #bc13fe; /* Neon Purple */
            background: #111;
            box-shadow: 0 0 20px #bc13fe;
            border-radius: 10px;
            width: 350px;
            position: relative;
        }

        h1 { font-size: 1.5rem; text-transform: uppercase; margin-bottom: 30px; }

        .btn-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 20px;
            height: 100px;
        }

        button {
            padding: 15px 25px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        #yes-btn {
            background: #00ff41;
            color: black;
        }

        #no-btn {
            background: #ff3131;
            color: white;
            position: absolute; /* Needed for movement */
        }

        #result {
            display: none;
            margin-top: 20px;
            font-size: 1.2rem;
            color: #bc13fe;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="box">
    <h1 id="question">Will you go out with me? <br>(Don't be a coward)</h1>
    
    <div class="btn-container">
        <button id="yes-btn" onclick="sayYes()">YES</button>
        <button id="no-btn" onmouseover="moveNo()" onclick="moveNo()">NO</button>
    </div>

    <div id="result">
        I KNEW IT! <br> Get ready, we're going out. ⚡
    </div>
</div>

<script>
    function moveNo() {
        const btn = document.getElementById('no-btn');
        // Calculate random position within the window
        const x = Math.random() * (window.innerWidth - btn.offsetWidth);
        const y = Math.random() * (window.innerHeight - btn.offsetHeight);
        
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
        
        // Change the text to tease her
        const phrases = ["Too slow!", "Missed me!", "Try harder!", "Nope!", "Haha!"];
        btn.innerText = phrases[Math.floor(Math.random() * phrases.length)];
    }

    function sayYes() {
        document.getElementById('question').style.display = 'none';
        document.getElementById('no-btn').style.display = 'none';
        document.getElementById('yes-btn').style.display = 'none';
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
