<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Choice Required</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0d0d0d; /* Dark high-energy background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .card {
            background: #1a1a1a;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(188, 19, 254, 0.3);
            text-align: center;
            border: 2px solid #bc13fe;
            width: 350px;
        }

        h1 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #yesBtn {
            background-color: #00ff41;
            color: #000;
        }

        #noBtn {
            background-color: #ff3131;
            color: #fff;
            position: absolute; /* Allows it to jump around */
        }

        #success-msg {
            display: none;
            color: #bc13fe;
            font-size: 1.5rem;
            font-weight: bold;
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1 id="question">Will you go on a date with me?</h1>
        <div class="btn-group" id="buttons">
            <button id="yesBtn" onclick="celebrate()">YES</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">NO</button>
        </div>
        <div id="success-msg">
            Heh. I knew you'd say yes. <br> Stop talking and get ready. ⚡
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');
        const buttons = document.getElementById('buttons');
        const successMsg = document.getElementById('success-msg');

        // This function makes the NO button jump away
        function moveButton() {
            // Calculate random positions
            // Subtracting 100 to keep it within the visible screen area
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 100);

            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
            
            // Optional: change the question slightly after a few misses
            question.innerText = "Don't even try it. Just click Yes.";
        }

        function celebrate() {
            // Hide the question and buttons
            question.style.display = 'none';
            buttons.style.display = 'none';
            
            // Show the winning message
            successMsg.style.display = 'block';
            
            // Add some "Chaos" effect
            document.body.style.backgroundColor = "#1a0033";
        }
    </script>
</body>
</html>
