<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Analysis Vault | Professional Edition</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #3b82f6;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #e2e8f0;
            margin: 0;
            padding: 20px;
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
        .subtitle { color: #64748b; font-size: 1.1rem; }

        /* Navigation Tabs */
        .tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 40px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 12px;
        }

        .tab-btn {
            padding: 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Question Cards */
        .question-block {
            background: #fff;
            padding: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .question-block:hover { transform: translateY(-2px); border-color: var(--secondary); }

        .options-row {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 10px;
        }

        .option-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            font-size: 0.8rem;
            color: #64748b;
            cursor: pointer;
        }

        input[type="radio"] { margin-bottom: 8px; width: 20px; height: 20px; cursor: pointer; }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.3s;
        }

        .submit-btn:hover { background: #1e40af; }

        /* Professional Result Section */
        #result-area {
            display: none;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        .result-card {
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid var(--primary);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Human Analysis Vault</h1>
        <p class="subtitle">Advanced Psychological & Logical Assessment</p>
    </header>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('personality', event)">Personality</button>
        <button class="tab-btn" onclick="showTab('logic', event)">Logic/IQ</button>
        <button class="tab-btn" onclick="showTab('social', event)">Social IQ</button>
        <button class="tab-btn" onclick="showTab('danger', event)">Instincts</button>
    </div>

    <form id="survey-form">
        <div id="questions-container"></div>
        <button type="button" class="submit-btn" onclick="calculateResult()">Generate My Full Report</button>
    </form>

    <div id="result-area">
        <div class="result-card">
            <h2 id="result-title" style="color:var(--primary)">Analysis Result</h2>
            <p id="result-text" style="font-size: 1.2rem; margin: 20px 0;"></p>
            <div id="additional-details" style="font-style: italic; color: #475569; margin-bottom: 20px;"></div>
            <button onclick="location.reload()" style="background:#64748b; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">New Analysis</button>
        </div>
    </div>
</div>

<script>
    const data = {
        personality: [
            "I prefer working on complex tasks over simple ones.",
            "I find it easy to stay calm in stressful situations.",
            "I enjoy exploring new places and ideas.",
            "I value logic over emotions in decision making.",
            "I am often the one to start conversations.",
            "I like to have a detailed plan for everything.",
            "I feel confident in my own abilities.",
            "I am easily bored by repetitive tasks.",
            "I consider myself a creative person.",
            "I believe in working hard rather than being lucky."
        ],
        logic: [
            "I solve puzzles faster than most people I know.",
            "I enjoy math and science more than other subjects.",
            "I can visualize complex shapes in my mind.",
            "I always look for the most efficient way to do a task.",
            "I enjoy strategic games like chess or card games.",
            "I quickly notice errors in logic during an argument.",
            "I like to break down problems into small parts.",
            "I am curious about how new technology works.",
            "I rely on facts rather than intuition.",
            "I find patterns in numbers easily."
        ],
        social: [
            "I can easily sense what someone else is feeling.",
            "I am comfortable speaking in front of a group.",
            "I make friends easily in new environments.",
            "I know how to resolve conflicts between people.",
            "I enjoy networking and meeting new professionals.",
            "I am good at convincing people to see my point of view.",
            "I prefer social gatherings over staying home.",
            "I listen more than I talk in a conversation.",
            "I adapt my behavior based on who I am with.",
            "I find it easy to trust others."
        ],
        danger: [
            "I trust my 'gut feeling' when I meet someone new.",
            "I react quickly when I sense something is wrong.",
            "I am not afraid to take calculated risks.",
            "I feel comfortable in high-pressure environments.",
            "I notice exits and surroundings when I enter a room.",
            "I can stay focused even when I am tired.",
            "I make decisions very quickly in emergencies.",
            "I don't let fear stop me from doing what is right.",
            "I have strong survival instincts.",
            "I am highly aware of my physical surroundings."
        ]
    };

    let currentCategory = 'personality';

    function showTab(cat, event) {
        currentCategory = cat;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        loadQuestions();
    }

    function loadQuestions() {
        const container = document.getElementById('questions-container');
        container.innerHTML = "";
        
        data[currentCategory].forEach((q, index) => {
            container.innerHTML += `
                <div class="question-block">
                    <p><strong>${index + 1}. ${q}</strong></p>
                    <div class="options-row">
                        <label class="option-label"><input type="radio" name="q${index}" value="1">1<br>Strongly Disagree</label>
                        <label class="option-label"><input type="radio" name="q${index}" value="2">2<br>Disagree</label>
                        <label class="option-label"><input type="radio" name="q${index}" value="3" checked>3<br>Neutral</label>
                        <label class="option-label"><input type="radio" name="q${index}" value="4">4<br>Agree</label>
                        <label class="option-label"><input type="radio" name="q${index}" value="5">5<br>Strongly Agree</label>
                    </div>
                </div>
            `;
        });
        window.scrollTo(0,0);
    }

    function calculateResult() {
        const form = document.getElementById('survey-form');
        const formData = new FormData(form);
        let score = 0;
        for (let value of formData.values()) { score += parseInt(value); }

        document.getElementById('survey-form').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        
        let title = "";
        let desc = "";
        let detail = "";

        if(currentCategory === 'personality') {
            title = score > 35 ? "The Architect" : "The Explorer";
            desc = score > 35 ? "You have a highly structured and disciplined mind." : "You thrive on freedom and new experiences.";
            detail = "Your personality profile suggests you are a natural leader in organized environments.";
        } else if(currentCategory === 'logic') {
            title = "Analytical Mastermind";
            desc = "Your score indicates a top-tier ability to process logic.";
            detail = "You would likely excel in careers involving engineering or data analysis.";
        } else if(currentCategory === 'social') {
            title = "The Empath";
            desc = "You have a deep understanding of social dynamics.";
            detail = "People feel naturally drawn to your energy and communication style.";
        } else {
            title = "The Guardian";
            desc = "Your instincts are sharp and protective.";
            detail = "You are highly observant and prepared for any situation.";
        }

        document.getElementById('result-title').innerText = title;
        document.getElementById('result-text').innerText = desc;
        document.getElementById('additional-details').innerText = detail;
    }

    loadQuestions();
</script>
</body>
</html>
