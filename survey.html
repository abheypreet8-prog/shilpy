<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interesting Survey</title>
    
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .survey-container {
            background-color: #16213e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            text-align: center;
            width: 85%;
            max-width: 500px;
        }
        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 15px 25px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        button:hover {
            background-color: #0f3460;
        }
    </style>
</head>
<body>

    <div class="survey-container">
        <h1 id="question-text">Loading...</h1>
        <div class="options">
            <button onclick="nextQuestion('Yes')">Yes</button>
            <button onclick="nextQuestion('No')">No</button>
            <button onclick="nextQuestion('Maybe')">Maybe</button>
        </div>
        <p id="progress">Question 1</p>
    </div>

    <script>
        const questions = [
            "Do you like to solve mysteries?",
            "Are you good at noticing small details?",
            "Do you make decisions based on logic?"
        ];

        let currentStep = 0;

        function nextQuestion(answer) {
            currentStep++;
            if (currentStep < questions.length) {
                document.getElementById("question-text").innerText = questions[currentStep];
                document.getElementById("progress").innerText = `Question ${currentStep + 1} of ${questions.length}`;
            } else {
                document.querySelector(".survey-container").innerHTML = `
                    <h1>Analysis Complete!</h1>
                    <p>Based on your choices, you have a high "Detective" IQ level!</p>
                    <button onclick="location.reload()">Try Again</button>
                `;
            }
        }
        // Start the first question
        document.getElementById("question-text").innerText = questions[0];
    </script>
</body>
</html>
