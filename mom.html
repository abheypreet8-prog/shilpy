<!DOCTYPE html>
<html>
<head>
    <title>Home for Mom</title>
    <style>
        body {
            background-color: #fff5f8; /* Soft pinkish-white */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 {
            color: #d63384; /* A nice rose color */
            font-size: 2.5rem;
        }
        p {
            color: #555;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome Home, Mom!</h1>
        <p>This is your personal space on the internet.</p>
    </div>
</body>
</html>
