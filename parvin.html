<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>CAUTION: HIGH VOLTAGE</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background 0.1s;
        }

        #container {
            width: 90%;
            text-align: center;
            border: 4px solid #f0f;
            padding: 20px;
            box-shadow: 0 0 20px #f0f;
            background: rgba(0,0,0,0.8);
        }

        .progress-bar {
            height: 10px;
            background: #333;
            width: 100%;
            margin-bottom: 20px;
        }

        #fill {
            height: 100%;
            background: #f0f;
            width: 0%;
            transition: 0.2s;
        }

        h2 { font-size: 1.2rem; text-transform: uppercase; margin-bottom: 30px; min-height: 60px; }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        button {
            padding: 20px;
            background: transparent;
            border: 2px solid #0f0;
            color: #0f0;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        button:active {
            background: #0f0;
            color: #000;
            transform: scale(0.95);
        }

        /* Animations */
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-2px, -1px); }
            100% { transform: translate(1px, 1px); }
        }
    </style>
</head>
<body>

<div id="container">
    <div class="progress-bar"><div id="fill"></div></div>
    <h2 id="q">INITIATING ANALYSIS... CLICK START</h2>
    
    <div class="btn-grid" id="controls">
        <button onclick="next()">START SYSTEM</button>
    </div>
</div>

<script>
    let count = 0;
    const questions = [
        "Why do you talk so much?", "Is your mouth ever tired?", "Are you actually a menace?",
        "Do you think you're scary?", "Answer faster!", "Do you like rude boys?",
        "Why are you still clicking?", "Is your battery dying?", "Stop talking for 2 seconds.",
        "You're failing the vibe check.", "Just admit you like me.", "Are you blushing?",
        "I bet you're making a face right now.", "Too slow!", "Keep going.",
        "45 questions left... cry about it.", "Are you gonna talk during our date too?",
        "You're a tomboy, act like it.", "Click the button, don't stare at it.",
        "Getting tired?", "I can do this all day.", "You're definitely annoying.",
        "But you're my favorite annoying person.", "Almost halfway...", "Focus!",
        "Stop thinking, just click.", "Why are you so loud?", "Do you ever whisper?",
        "Liar.", "Click again.", "And again.", "Faster!", "STILL TOO SLOW.",
        "Are you mad yet?", "Good. I like it when you're mad.", "Keep clicking.",
        "Almost there...", "Don't stop now.", "Will you go out with me?", "Say yes.",
        "Say yes or I reset the count.", "Just click it.", "YES OR YES?", "DONE."
    ];

    // Fill to 60
    while(questions.length < 60) {
        questions.splice(questions.length - 2, 0, "KEEP CLICKING.");
    }

    function next() {
        if(count < questions.length) {
            const container = document.getElementById('container');
            const q = document.getElementById('q');
            const fill = document.getElementById('fill');
            
            q.innerText = questions[count];
            count++;
            
            // Progress Bar
            fill.style.width = (count / 60 * 100) + "%";

            // Visual Chaos
            if(count > 20) document.body.style.background = (count % 2 === 0) ? "#100" : "#000";
            if(count > 40) container.classList.add('shake');
            
            // Change buttons after first click
            document.getElementById('controls').innerHTML = `
                <button onclick="next()">YES</button>
                <button onclick="alert('NO IS NOT AN OPTION')">NO</button>
            `;
        } else {
            document.body.innerHTML = `
                <div style="text-align:center; color:#f0f; padding:20px;">
                    <h1>SYSTEM CRASHED</h1>
                    <p style="color:#fff">You're too much to handle. <br> Friday night. Be ready. <br> And bring that loud mouth with you. 🔥</p>
                </div>
            `;
        }
    }
</script>

</body>
</html>
